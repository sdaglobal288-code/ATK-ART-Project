<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Master Barang</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/dashboard.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script src="supabase/config.js"></script>

</head>

<body>

<div class="content">

    <h2>📦 Master Barang</h2>

    <br>

    <!-- Toolbar -->

    <div class="toolbar">

        <button
            class="btn-dashboard"
            onclick="location.href='dashboard.html'">

            🏠 Dashboard

        </button>

        <button
            class="btn-import"
            onclick="document.getElementById('fileImport').click()">

            📥 Import Excel

        </button>

        <input
            type="file"
            id="fileImport"
            accept=".xlsx,.xls"
            hidden>

        <button
            class="btn-export"
            onclick="exportExcel()">

            📤 Export Excel

        </button>

    </div>

    <!-- FORM -->

    <div class="panel">

        <h3>Tambah Barang</h3>

        <br>

        <form id="formBarang">

            <input
                type="text"
                id="kode_barang"
                placeholder="Kode Barang"
                required>

            <input
                type="text"
                id="nama_barang"
                placeholder="Nama Barang"
                required>

            <select id="kategori" required>

                <option value="">
                    -- Pilih Kategori --
                </option>

            </select>

            <select id="satuan" required>

                <option value="">
                    -- Pilih Satuan --
                </option>

            </select>

            <input
                type="number"
                id="stok_minimum"
                placeholder="Stok Minimum"
                value="0">

            <button type="submit">

                💾 Simpan Barang

            </button>

        </form>

    </div>

    <!-- TABEL -->

    <div class="panel">

        <h3>Daftar Barang</h3>

        <br>

        <table id="tableBarang">

            <thead>

                <tr>

                    <th width="140">Kode</th>

                    <th>Nama Barang</th>

                    <th width="170">Kategori</th>

                    <th width="120">Satuan</th>

                    <th width="130">Stok Minimum</th>

                    <th width="180">Aksi</th>

                </tr>

            </thead>

            <tbody>

            </tbody>

        </table>

    </div>

</div>

<script src="js/master-barang.js"></script>

</body>

</html>
