<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Barang Keluar</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/dashboard.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script src="supabase/config.js"></script>

</head>

<body>

<div class="content">

<h2>📤 Barang Keluar</h2>

<br>

<!-- ================= TOOLBAR ================= -->

<div class="toolbar">

<button
class="btn-dashboard"
onclick="location.href='dashboard.html'">

🏠 Dashboard

</button>

<button
class="btn-import"
onclick="document.getElementById('fileImport').click()">

📥 Import Excel

</button>

<input
type="file"
id="fileImport"
accept=".xlsx,.xls"
hidden>

<button
class="btn-export"
onclick="exportExcel()">

📤 Export Excel

</button>

</div>

<br>

<!-- ================= FORM ================= -->

<div class="panel">

<h3 id="judulForm">

➖ Barang Keluar

</h3>

<br>

<form id="formKeluar">

<input
type="date"
id="tanggal"
required>

<select
id="pengambil"
required>

<option value="">
-- Pilih Nama Pengambil --
</option>

</select>

<input
type="text"
id="departemen"
placeholder="Departemen"
readonly>

<input
type="text"
id="jabatan"
placeholder="Jabatan"
readonly>

<select
id="barang"
required>

<option value="">
-- Pilih Barang --
</option>

</select>

<input
type="text"
id="kategori"
placeholder="Kategori"
readonly>

<input
type="text"
id="satuan"
placeholder="Satuan"
readonly>

<input
type="number"
id="qty"
placeholder="Qty Keluar"
required>

<input
type="text"
id="keterangan"
placeholder="Keterangan">

<div style="grid-column:1/3;display:flex;gap:10px;">

<button
type="submit"
id="btnSimpan">

💾 Simpan Barang Keluar

</button>

<button
type="button"
id="btnBatal"
style="display:none;">

❌ Batal

</button>

</div>

</form>

</div>

<br>

<!-- ================= TABEL ================= -->

<div class="panel">

<h3>Histori Barang Keluar</h3>

<br>

<table id="tableKeluar">

<thead>

<tr>

<th width="60">No</th>

<th width="120">Tanggal</th>

<th width="220">Pengambil</th>

<th width="160">Departemen</th>

<th width="150">Jabatan</th>

<th>Nama Barang</th>

<th width="90">Qty</th>

<th width="90">Satuan</th>

<th width="180">Created By</th>

<th width="180">Aksi</th>

</tr>

</thead>

<tbody>

</tbody>

</table>

</div>

</div>

<script src="js/barang-keluar.js"></script>

</body>

</html>
