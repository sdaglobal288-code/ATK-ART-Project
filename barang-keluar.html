<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barang Keluar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/dashboard.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="supabase/config.js"></script>
<style>
    /* ====== Tambahan khusus multi-item & stok realtime ====== */
    .detail-wrapper{
        border:1px solid #e2e8f0;
        border-radius:10px;
        padding:14px;
        margin-bottom:12px;
        background:#f8fafc;
    }
    .detail-row{
        display:grid;
        grid-template-columns: 2fr 1.2fr 1fr 1fr 1fr 40px;
        gap:8px;
        align-items:center;
        margin-bottom:8px;
    }
    .detail-row select,
    .detail-row input{
        width:100%;
        padding:8px;
        border:1px solid #cbd5e1;
        border-radius:6px;
        font-family:inherit;
        font-size:13px;
        box-sizing:border-box;
    }
    .detail-row input[readonly]{
        background:#eef2f7;
        color:#475569;
    }
    .stok-badge{
        font-weight:600;
        font-size:13px;
        padding:8px 6px;
        border-radius:6px;
        text-align:center;
        background:#e2f6ea;
        color:#15803d;
        border:1px solid #bbf7d0;
    }
    .stok-badge.warning{
        background:#fef2f2;
        color:#b91c1c;
        border:1px solid #fecaca;
    }
    .btn-hapus-baris{
        background:#fee2e2;
        color:#b91c1c;
        border:1px solid #fecaca;
        border-radius:6px;
        cursor:pointer;
        font-weight:700;
        height:36px;
    }
    .btn-hapus-baris:hover{
        background:#fecaca;
    }
    .btn-tambah-baris{
        background:#e0f2fe;
        color:#0369a1;
        border:1px solid #bae6fd;
        border-radius:6px;
        padding:8px 14px;
        cursor:pointer;
        font-weight:600;
        font-size:13px;
        margin-top:4px;
    }
    .btn-tambah-baris:hover{
        background:#bae6fd;
    }
    .detail-row.qty-invalid input[type="number"]{
        border-color:#ef4444;
        background:#fef2f2;
    }
    .header-label{
        display:grid;
        grid-template-columns: 2fr 1.2fr 1fr 1fr 1fr 40px;
        gap:8px;
        font-size:12px;
        font-weight:600;
        color:#64748b;
        margin-bottom:6px;
        padding:0 2px;
    }
</style>
</head>
<body>
<div class="content">
<h2>📤 Barang Keluar</h2>
<br>
<!-- ================= TOOLBAR ================= -->
<div class="toolbar">
<button
class="btn-dashboard"
onclick="location.href='dashboard.html'">
🏠 Dashboard
</button>
<button
class="btn-import"
onclick="document.getElementById('fileImport').click()">
📥 Import Excel
</button>
<input
type="file"
id="fileImport"
accept=".xlsx,.xls"
hidden>
<button
class="btn-export"
onclick="exportExcel()">
📤 Export Excel
</button>
</div>
<br>
<!-- ================= FORM ================= -->
<div class="panel">
<h3 id="judulForm">
➖ Barang Keluar
</h3>
<br>
<form id="formKeluar">
<input
type="date"
id="tanggal"
required>
<select
id="pengambil"
required>
<option value="">
-- Pilih Nama Pengambil --
</option>
</select>
<input
type="text"
id="departemen"
placeholder="Departemen"
readonly>
<input
type="text"
id="jabatan"
placeholder="Jabatan"
readonly>
<input
type="text"
id="keterangan"
placeholder="Keterangan (opsional, berlaku untuk semua barang)"
style="grid-column:1/3;">

<!-- ================= DETAIL BARANG (MULTI ITEM) ================= -->
<div style="grid-column:1/3;">
    <div class="header-label">
        <span>Barang</span>
        <span>Kategori</span>
        <span>Satuan</span>
        <span>Sisa Stok</span>
        <span>Qty Keluar</span>
        <span></span>
    </div>
    <div class="detail-wrapper" id="detailRows">
        <!-- baris detail barang akan ditambahkan lewat JS -->
    </div>
    <button type="button" class="btn-tambah-baris" id="btnTambahBaris">
        ➕ Tambah Barang
    </button>
</div>

<div style="grid-column:1/3;display:flex;gap:10px;">
<button
type="submit"
id="btnSimpan">
💾 Simpan Barang Keluar
</button>
<button
type="button"
id="btnBatal"
style="display:none;">
❌ Batal
</button>
</div>
</form>
</div>
<br>
<!-- ================= TABEL ================= -->
<div class="panel">
<h3>Histori Barang Keluar</h3>
<br>
<input
type="text"
id="search"
placeholder="🔍 Cari data barang keluar..."
style="width:100%;padding:10px;margin-bottom:10px;border:1px solid #cbd5e1;border-radius:6px;box-sizing:border-box;">
<table id="tableKeluar">
<thead>
<tr>
<th width="60">No</th>
<th width="120">Tanggal</th>
<th width="220">Pengambil</th>
<th width="160">Departemen</th>
<th width="150">Jabatan</th>
<th>Nama Barang</th>
<th width="90">Qty</th>
<th width="90">Satuan</th>
<th width="180">Created By</th>
<th width="180">Aksi</th>
</tr>
</thead>
<tbody>
</tbody>
</table>
</div>
</div>
<script src="js/barang-keluar.js"></script>
</body>
</html>
