<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Master Karyawan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/dashboard.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="supabase/config.js"></script>
<style>
  :root{
    --mk-bg:#0f1018;
    --mk-surface:#171926;
    --mk-surface-2:#1e2130;
    --mk-border:#2a2d3d;
    --mk-text:#e9eaf2;
    --mk-muted:#9498ab;
    --mk-purple:#6c5dd3;
    --mk-purple-dark:#5a4cc0;
    --mk-purple-soft:rgba(108,93,211,.15);
    --mk-danger:#ef5675;
    --mk-danger-soft:rgba(239,84,117,.12);
    --mk-success:#3ecf8e;
    --mk-success-soft:rgba(62,207,142,.12);
    --mk-warning:#f59e0b;
    --mk-warning-soft:rgba(245,158,11,.12);
  }

  body{
    font-family:'Inter', sans-serif;
    background:var(--mk-bg);
    color:var(--mk-text);
  }

  .content{
    max-width:1280px;
    margin:0 auto;
    padding:28px 24px 60px;
  }

  .content h2{
    font-size:23px;
    font-weight:700;
    color:var(--mk-text);
    display:flex;
    align-items:center;
    gap:10px;
    margin:0;
  }

  .page-subtitle{
    color:var(--mk-muted);
    font-size:13.5px;
    margin-top:4px;
  }

  /* ===== Toolbar ===== */
  .toolbar{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
  }

  .toolbar button{
    display:inline-flex;
    align-items:center;
    gap:8px;
    border:none;
    border-radius:10px;
    padding:10px 18px;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
    transition:opacity .15s ease, transform .12s ease;
  }

  .toolbar button:active{ transform:translateY(1px); }

  .btn-dashboard{
    background:var(--mk-surface-2);
    color:var(--mk-text);
    border:1px solid var(--mk-border);
  }
  .btn-dashboard:hover{ background:#262a3c; }

  .btn-tambah{
    background:linear-gradient(135deg, var(--mk-purple), var(--mk-purple-dark));
    color:#fff;
    box-shadow:0 4px 12px rgba(108,93,211,.35);
  }
  .btn-tambah:hover{ opacity:.92; }

  .btn-import-xl{
    background:var(--mk-surface-2);
    color:var(--mk-text);
    border:1px solid var(--mk-border);
  }
  .btn-import-xl:hover{ background:#262a3c; }

  .btn-export-xl{
    background:var(--mk-surface-2);
    color:var(--mk-text);
    border:1px solid var(--mk-border);
  }
  .btn-export-xl:hover{ background:#262a3c; }

  /* ===== Panel ===== */
  .panel{
    background:var(--mk-surface);
    border:1px solid var(--mk-border);
    border-radius:14px;
    padding:22px 24px;
    box-shadow:0 4px 16px rgba(0,0,0,.18);
  }

  .panel h3{
    margin:0 0 16px;
    font-size:16px;
    font-weight:600;
    color:var(--mk-text);
    display:flex;
    align-items:center;
    justify-content:space-between;
  }

  .total-badge{
    font-size:12.5px;
    font-weight:600;
    color:var(--mk-purple);
    background:var(--mk-purple-soft);
    padding:4px 10px;
    border-radius:999px;
  }

  /* ===== Search ===== */
  .table-toolbar{
    display:flex;
    align-items:center;
    gap:12px;
    flex-wrap:wrap;
    margin-bottom:16px;
  }

  .search-box{
    flex:1;
    min-width:220px;
    max-width:340px;
    padding:10px 14px;
    border:1px solid var(--mk-border);
    border-radius:10px;
    font-size:13.5px;
    font-family:inherit;
    color:var(--mk-text);
    background:var(--mk-surface-2);
    transition:border-color .15s ease, box-shadow .15s ease;
  }
  .search-box:focus{
    outline:none;
    border-color:var(--mk-purple);
    box-shadow:0 0 0 3px var(--mk-purple-soft);
  }
  .search-box::placeholder{ color:#5d6175; }

  .filter-select{
    padding:10px 14px;
    border:1px solid var(--mk-border);
    border-radius:10px;
    font-size:13.5px;
    font-family:inherit;
    color:var(--mk-text);
    background:var(--mk-surface-2);
    cursor:pointer;
    transition:border-color .15s ease;
  }
  .filter-select:focus{
    outline:none;
    border-color:var(--mk-purple);
    box-shadow:0 0 0 3px var(--mk-purple-soft);
  }

  /* ===== Table ===== */
  .table-wrap{
    overflow-x:auto;
    border-radius:10px;
    border:1px solid var(--mk-border);
  }

  table{
    width:100%;
    border-collapse:collapse;
    font-size:13.5px;
    min-width:900px;
  }

  thead th{
    background:var(--mk-surface-2);
    color:var(--mk-muted);
    text-transform:uppercase;
    font-size:11.5px;
    letter-spacing:.04em;
    font-weight:700;
    text-align:left;
    padding:12px 14px;
    border-bottom:1px solid var(--mk-border);
    white-space:nowrap;
  }

  tbody td{
    padding:11px 14px;
    border-bottom:1px solid var(--mk-border);
    color:var(--mk-text);
    vertical-align:middle;
  }

  tbody tr:last-child td{ border-bottom:none; }

  #tableKaryawan tbody tr:hover td{
    background:transparent !important;
    color:var(--mk-text) !important;
  }

  .nik-pill{
    display:inline-block;
    font-weight:600;
    color:#bcb2f5;
    background:var(--mk-purple-soft);
    padding:3px 9px;
    border-radius:6px;
    font-size:12.5px;
    letter-spacing:.02em;
    white-space:nowrap;
  }

  /* Status badge */
  .badge-aktif{
    display:inline-flex;
    align-items:center;
    gap:5px;
    background:var(--mk-success-soft);
    color:var(--mk-success);
    padding:4px 10px;
    border-radius:999px;
    font-size:12.5px;
    font-weight:600;
    white-space:nowrap;
  }
  .badge-aktif::before{
    content:'';
    width:6px; height:6px;
    border-radius:50%;
    background:var(--mk-success);
    display:inline-block;
  }

  .badge-nonaktif{
    display:inline-flex;
    align-items:center;
    gap:5px;
    background:var(--mk-danger-soft);
    color:var(--mk-danger);
    padding:4px 10px;
    border-radius:999px;
    font-size:12.5px;
    font-weight:600;
    white-space:nowrap;
  }
  .badge-nonaktif::before{
    content:'';
    width:6px; height:6px;
    border-radius:50%;
    background:var(--mk-danger);
    display:inline-block;
  }

  .actions-cell{ display:flex; gap:8px; }

  .btn-edit, .btn-delete{
    display:inline-flex;
    align-items:center;
    gap:5px;
    border-radius:8px;
    padding:7px 13px;
    font-size:12.5px;
    font-weight:600;
    font-family:inherit;
    cursor:pointer;
    transition:background .15s ease, color .15s ease, border-color .15s ease, transform .12s ease;
  }
  .btn-edit:active, .btn-delete:active{ transform:translateY(1px); }

  .btn-edit{
    background:transparent;
    color:#bcb2f5 !important;
    border:1px solid #4d4499;
  }
  .btn-edit:hover{
    background:var(--mk-purple) !important;
    color:#fff !important;
    border-color:var(--mk-purple);
  }

  .btn-delete{
    background:transparent;
    color:var(--mk-danger) !important;
    border:1px solid #8a3548;
  }
  .btn-delete:hover{
    background:var(--mk-danger) !important;
    color:#fff !important;
    border-color:var(--mk-danger);
  }

  .empty-state, .loading-state{
    text-align:center;
    padding:36px 10px;
    color:var(--mk-muted);
    font-size:14px;
  }

  .loading-state .spinner{
    display:inline-block;
    width:16px; height:16px;
    border:2px solid var(--mk-border);
    border-top-color:var(--mk-purple);
    border-radius:50%;
    animation:spin .7s linear infinite;
    margin-right:8px;
    vertical-align:middle;
  }

  @keyframes spin{ to{ transform:rotate(360deg); } }

  /* ===== Modal ===== */
  .modal-overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(8,9,15,.65);
    backdrop-filter:blur(2px);
    align-items:center;
    justify-content:center;
    z-index:1000;
    padding:20px;
  }
  .modal-overlay.active{ display:flex; }

  .modal-box{
    background:var(--mk-surface);
    border:1px solid var(--mk-border);
    border-radius:14px;
    width:620px;
    max-width:100%;
    max-height:90vh;
    overflow-y:auto;
    box-shadow:0 20px 50px rgba(0,0,0,.45);
    animation:modalPop .15s ease;
  }

  @keyframes modalPop{
    from{ opacity:0; transform:translateY(8px) scale(.98); }
    to{ opacity:1; transform:translateY(0) scale(1); }
  }

  .modal-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:18px 22px;
    border-bottom:1px solid var(--mk-border);
  }

  .modal-header h3{
    margin:0;
    font-size:16px;
    font-weight:700;
    color:var(--mk-text);
  }

  .modal-close{
    background:none;
    border:none;
    color:var(--mk-muted);
    font-size:18px;
    cursor:pointer;
    padding:4px;
    border-radius:6px;
    transition:background .15s ease, color .15s ease;
  }
  .modal-close:hover{ background:var(--mk-surface-2); color:var(--mk-text); }

  /* Paksa form block agar dashboard.css grid tidak memecah layout modal */
  #formKaryawan{
    display:block !important;
  }

  .modal-body{
    padding:22px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:16px;
  }

  @media(max-width:540px){
    .modal-body{ grid-template-columns:1fr; }
  }

  .modal-footer{
    display:flex;
    justify-content:flex-end;
    gap:10px;
    padding:16px 22px;
    border-top:1px solid var(--mk-border);
  }

  /* field */
  .field{ display:flex; flex-direction:column; gap:6px; }
  .field.full{ grid-column:1 / -1; }

  .field label{
    font-size:12.5px;
    font-weight:600;
    color:var(--mk-muted);
    text-transform:uppercase;
    letter-spacing:.03em;
  }

  .field input,
  .field select{
    width:100%;
    box-sizing:border-box;
    padding:11px 14px;
    border:1px solid var(--mk-border);
    border-radius:10px;
    font-size:14px;
    font-family:inherit;
    color:var(--mk-text);
    background:var(--mk-surface-2);
    transition:border-color .15s ease, box-shadow .15s ease;
  }

  .field input::placeholder{ color:#5d6175; }

  .field input:focus,
  .field select:focus{
    outline:none;
    border-color:var(--mk-purple);
    box-shadow:0 0 0 3px var(--mk-purple-soft);
  }

  .field input[readonly]{
    opacity:.65;
    cursor:not-allowed;
  }

  /* Buttons modal */
  #btnSimpan{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    height:42px;
    background:linear-gradient(135deg, var(--mk-purple), var(--mk-purple-dark));
    color:#fff;
    border:none;
    border-radius:10px;
    padding:0 22px;
    font-size:14px;
    font-weight:600;
    font-family:inherit;
    cursor:pointer;
    box-shadow:0 4px 12px rgba(108,93,211,.3);
    transition:filter .15s ease, transform .12s ease;
  }
  #btnSimpan:hover{ filter:brightness(1.08); }
  #btnSimpan:active{ transform:translateY(1px); }
  #btnSimpan:disabled{ opacity:.55; cursor:not-allowed; filter:none; box-shadow:none; }

  #btnBatal{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    height:42px;
    background:transparent;
    color:var(--mk-danger);
    border:1px solid #5a2a36;
    border-radius:10px;
    padding:0 18px;
    font-size:14px;
    font-weight:600;
    font-family:inherit;
    cursor:pointer;
    transition:background .15s ease, border-color .15s ease;
  }
  #btnBatal:hover{ background:var(--mk-danger-soft); border-color:var(--mk-danger); }
</style>
</head>
<body>
<div class="content">

  <h2>👥 Master Karyawan</h2>
  <p class="page-subtitle">Kelola data master karyawan: NIK, nama, departemen, jabatan, dan status.</p>
  <br>

  <!-- ================= TOOLBAR ================= -->
  <div class="toolbar">
    <button class="btn-dashboard" onclick="location.href='dashboard.html'">
      🏠 Dashboard
    </button>
    <button class="btn-tambah" onclick="bukaModalTambah()">
      ➕ Tambah Karyawan
    </button>
    <button class="btn-import-xl" onclick="document.getElementById('fileImport').click()">
      📥 Import Excel
    </button>
    <input type="file" id="fileImport" accept=".xlsx,.xls,.csv" hidden>
    <button class="btn-export-xl" onclick="exportExcel()">
      📤 Export Excel
    </button>
  </div>
  <br>

  <!-- ================= TABLE ================= -->
  <div class="panel">
    <h3>
      Daftar Karyawan
      <span class="total-badge" id="totalBadge">0 karyawan</span>
    </h3>

    <div class="table-toolbar">
      <input type="text" id="searchKaryawan" class="search-box" placeholder="🔍 Cari NIK atau nama karyawan...">
      <select id="filterDept" class="filter-select">
        <option value="">Semua Departemen</option>
      </select>
      <select id="filterStatus" class="filter-select">
        <option value="">Semua Status</option>
        <option value="Aktif">Aktif</option>
        <option value="Non Aktif">Non Aktif</option>
      </select>
    </div>

    <div class="table-wrap">
      <table id="tableKaryawan">
        <thead>
          <tr>
            <th width="110">NIK</th>
            <th>Nama Karyawan</th>
            <th width="160">Departemen</th>
            <th width="160">Jabatan</th>
            <th width="110">Status</th>
            <th width="150">Dibuat Oleh</th>
            <th width="170">Aksi</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td colspan="7" class="loading-state">
              <span class="spinner"></span> Memuat data...
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<!-- ================= MODAL TAMBAH/EDIT KARYAWAN ================= -->
<div class="modal-overlay" id="modalKaryawan">
  <div class="modal-box">

    <div class="modal-header">
      <h3 id="judulForm">➕ Tambah Karyawan</h3>
      <button type="button" class="modal-close" onclick="tutupModal()">✕</button>
    </div>

    <form id="formKaryawan">
      <div class="modal-body">

        <div class="field">
          <label for="nik">NIK</label>
          <input type="text" id="nik" placeholder="Contoh: KRY001" required>
        </div>

        <div class="field">
          <label for="nama">Nama Karyawan</label>
          <input type="text" id="nama" placeholder="Nama lengkap" required>
        </div>

        <div class="field">
          <label for="departemen">Departemen</label>
          <select id="departemen" required>
            <option value="">-- Pilih Departemen --</option>
          </select>
        </div>

        <div class="field">
          <label for="jabatan">Jabatan</label>
          <select id="jabatan" required>
            <option value="">-- Pilih Jabatan --</option>
          </select>
        </div>

        <div class="field full">
          <label for="status">Status</label>
          <select id="status">
            <option value="Aktif">Aktif</option>
            <option value="Non Aktif">Non Aktif</option>
          </select>
        </div>

      </div>

      <div class="modal-footer">
        <button type="button" id="btnBatal" onclick="tutupModal()">Batal</button>
        <button type="submit" id="btnSimpan">💾 Simpan Karyawan</button>
      </div>
    </form>

  </div>
</div>

<script src="js/master-karyawan.js"></script>
</body>
</html>
