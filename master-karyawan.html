<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Master Karyawan</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/dashboard.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="supabase/config.js"></script>

</head>

<body>

<div class="content">

<h2>👥 Master Karyawan</h2>

<br>

<!-- ================= TOOLBAR ================= -->

<div class="toolbar">

<button
class="btn-dashboard"
onclick="location.href='dashboard.html'">

🏠 Dashboard

</button>

<button
class="btn-import"
onclick="document.getElementById('fileImport').click()">

📥 Import Excel

</button>

<input
type="file"
id="fileImport"
accept=".xlsx,.xls"
hidden>

<button
class="btn-export"
onclick="exportExcel()">

📤 Export Excel

</button>

</div>

<br>

<!-- ================= FORM ================= -->

<div class="panel">

<h3>Tambah Karyawan</h3>

<br>

<form id="formKaryawan">

<input
type="text"
id="nik"
placeholder="NIK"
required>

<input
type="text"
id="nama"
placeholder="Nama Karyawan"
required>

<select id="departemen" required>

<option value="">
-- Pilih Departemen --
</option>

</select>

<select id="jabatan" required>

<option value="">
-- Pilih Jabatan --
</option>

</select>

<select id="status">

<option value="Aktif">
Aktif
</option>

<option value="Non Aktif">
Non Aktif
</option>

</select>

<button
type="submit">

💾 Simpan Karyawan

</button>

</form>

</div>

<br>

<!-- ================= TABEL ================= -->

<div class="panel">

<h3>Daftar Karyawan</h3>

<br>

<table id="tableKaryawan">

<thead>

<tr>

<th width="110">NIK</th>

<th>Nama</th>

<th width="160">Gudang</th>

<th width="180">Departemen</th>

<th width="180">Jabatan</th>

<th width="110">Status</th>

<th width="180">Created By</th>

<th width="170">Aksi</th>

</tr>

</thead>

<tbody>

</tbody>

</table>

</div>

</div>

<script src="js/master-karyawan.js"></script>

</body>

</html>
