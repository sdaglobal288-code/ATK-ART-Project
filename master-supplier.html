<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Master Supplier</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/dashboard.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="supabase/config.js"></script>
<style>
  :root{
    --md-bg:#0f1018;
    --md-surface:#171926;
    --md-surface-2:#1e2130;
    --md-border:#2a2d3d;
    --md-text:#e9eaf2;
    --md-muted:#9498ab;
    --md-purple:#6c5dd3;
    --md-purple-dark:#5a4cc0;
    --md-purple-soft:rgba(108,93,211,.15);
    --md-danger:#ef5675;
    --md-danger-soft:rgba(239,84,117,.12);
  }

  body{
    font-family:'Inter', sans-serif;
    background:var(--md-bg);
    color:var(--md-text);
  }

  .content{
    max-width:1100px;
    margin:0 auto;
    padding:28px 24px 60px;
  }

  .content h2{
    font-size:23px;
    font-weight:700;
    color:var(--md-text);
    display:flex;
    align-items:center;
    gap:10px;
    margin:0;
  }

  .page-subtitle{
    color:var(--md-muted);
    font-size:13.5px;
    margin-top:4px;
  }

  /* ===== Toolbar ===== */
  .toolbar{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
  }

  .toolbar button{
    display:inline-flex;
    align-items:center;
    gap:8px;
    border:none;
    border-radius:10px;
    padding:10px 18px;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
    transition:transform .12s ease, box-shadow .12s ease, opacity .15s ease;
  }

  .toolbar button:active{ transform: translateY(1px); }

  .btn-dashboard{
    background:var(--md-surface-2);
    color:var(--md-text);
    border:1px solid var(--md-border);
  }
  .btn-dashboard:hover{ background:#262a3c; }

  .btn-import{
    background:var(--md-surface-2);
    color:var(--md-text);
    border:1px solid var(--md-border);
  }
  .btn-import:hover{ background:#262a3c; }

  .btn-export{
    background:linear-gradient(135deg, var(--md-purple), var(--md-purple-dark));
    color:#fff;
    box-shadow:0 4px 12px rgba(108,93,211,.35);
  }
  .btn-export:hover{ opacity:.92; }

  /* ===== Panel ===== */
  .panel{
    background:var(--md-surface);
    border:1px solid var(--md-border);
    border-radius:14px;
    padding:22px 24px;
    box-shadow:0 4px 16px rgba(0,0,0,.18);
  }

  .panel h3{
    margin:0 0 16px;
    font-size:16px;
    font-weight:600;
    color:var(--md-text);
    display:flex;
    align-items:center;
    justify-content:space-between;
  }

  .total-badge{
    font-size:12.5px;
    font-weight:600;
    color:var(--md-purple);
    background:var(--md-purple-soft);
    padding:4px 10px;
    border-radius:999px;
  }

  /* ===== Form (dalam modal) ===== */
  #formSupplier{
    display:block !important;
  }

  .form-grid{
    display:grid !important;
    grid-template-columns: 1fr 1fr !important;
    gap:16px;
  }

  @media (max-width:680px){
    .form-grid{ grid-template-columns: 1fr; }
  }

  .field{
    display:flex;
    flex-direction:column;
    gap:6px;
  }

  .field label{
    font-size:12.5px;
    font-weight:600;
    color:var(--md-muted);
    text-transform:uppercase;
    letter-spacing:.03em;
  }

  #formSupplier input{
    width:100%;
    box-sizing:border-box;
    padding:11px 14px;
    border:1px solid var(--md-border);
    border-radius:10px;
    font-size:14px;
    font-family:inherit;
    color:var(--md-text);
    background:var(--md-surface-2);
    transition:border-color .15s ease, box-shadow .15s ease;
  }

  #formSupplier input::placeholder{ color:#5d6175; }

  #formSupplier input:focus{
    outline:none;
    border-color:var(--md-purple);
    box-shadow:0 0 0 3px var(--md-purple-soft);
  }

  #formSupplier input[readonly]{
    opacity:.65;
    cursor:not-allowed;
  }

  .form-actions{
    grid-column: 1 / -1;
    display:flex !important;
    align-items:center !important;
    gap:12px;
    margin-top:6px;
    height:auto !important;
  }

  #btnSimpan{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    height:44px !important;
    background:linear-gradient(135deg, var(--md-purple), var(--md-purple-dark));
    color:#fff;
    border:none;
    border-radius:10px;
    padding:0 24px;
    font-size:14px;
    font-weight:600;
    font-family:inherit;
    cursor:pointer;
    box-shadow:0 4px 12px rgba(108,93,211,.3);
    transition:filter .15s ease, transform .12s ease, box-shadow .15s ease;
  }
  #btnSimpan:hover{ filter:brightness(1.08); box-shadow:0 6px 16px rgba(108,93,211,.4); }
  #btnSimpan:active{ transform: translateY(1px); }
  #btnSimpan:disabled{ opacity:.55; cursor:not-allowed; filter:none; box-shadow:none; }

  #btnBatal{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    height:44px !important;
    background:transparent;
    color:var(--md-danger);
    border:1px solid #5a2a36;
    border-radius:10px;
    padding:0 20px;
    font-size:14px;
    font-weight:600;
    font-family:inherit;
    cursor:pointer;
    transition:background .15s ease, border-color .15s ease;
  }
  #btnBatal:hover{ background:var(--md-danger-soft); border-color:var(--md-danger); }

  /* ===== Search row above table ===== */
  .table-toolbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:14px;
    flex-wrap:wrap;
    margin-bottom:16px;
  }

  .search-box{
    flex:1;
    min-width:220px;
    max-width:340px;
    padding:10px 14px;
    border:1px solid var(--md-border);
    border-radius:10px;
    font-size:13.5px;
    font-family:inherit;
    color:var(--md-text);
    background:var(--md-surface-2);
  }
  .search-box:focus{
    outline:none;
    border-color:var(--md-purple);
    box-shadow:0 0 0 3px var(--md-purple-soft);
  }

  /* ===== Table ===== */
  .table-wrap{
    overflow-x:auto;
    border-radius:10px;
    border:1px solid var(--md-border);
  }

  table{
    width:100%;
    border-collapse:collapse;
    font-size:13.5px;
    min-width:560px;
  }

  thead th{
    background:var(--md-surface-2);
    color:var(--md-muted);
    text-transform:uppercase;
    font-size:11.5px;
    letter-spacing:.04em;
    font-weight:700;
    text-align:left;
    padding:12px 14px;
    border-bottom:1px solid var(--md-border);
    white-space:nowrap;
  }

  tbody td{
    padding:11px 14px;
    border-bottom:1px solid var(--md-border);
    color:var(--md-text);
    vertical-align:middle;
  }

  tbody tr:last-child td{ border-bottom:none; }
  #tableSupplier tbody tr:hover td{
    background:transparent !important;
    color:var(--md-text) !important;
  }

  .kode-pill{
    display:inline-block;
    font-weight:600;
    color:#bcb2f5;
    background:var(--md-purple-soft);
    padding:3px 9px;
    border-radius:6px;
    font-size:12.5px;
    letter-spacing:.02em;
  }

  .actions-cell{
    display:flex;
    gap:8px;
  }

  .btn-edit, .btn-delete{
    display:inline-flex;
    align-items:center;
    gap:5px;
    border-radius:8px;
    padding:7px 13px;
    font-size:12.5px;
    font-weight:600;
    font-family:inherit;
    cursor:pointer;
    transition:background .15s ease, color .15s ease, border-color .15s ease, transform .12s ease;
  }
  .btn-edit:active, .btn-delete:active{ transform:translateY(1px); }

  .btn-edit{
    background:transparent;
    color:#bcb2f5 !important;
    border:1px solid #4d4499;
  }
  .btn-edit:hover{
    background:var(--md-purple) !important;
    color:#fff !important;
    border-color:var(--md-purple);
  }

  .btn-delete{
    background:transparent;
    color:var(--md-danger) !important;
    border:1px solid #8a3548;
  }
  .btn-delete:hover{
    background:var(--md-danger) !important;
    color:#fff !important;
    border-color:var(--md-danger);
  }

  .empty-state, .loading-state{
    text-align:center;
    padding:36px 10px;
    color:var(--md-muted);
    font-size:14px;
  }

  .loading-state .spinner{
    display:inline-block;
    width:16px; height:16px;
    border:2px solid var(--md-border);
    border-top-color:var(--md-purple);
    border-radius:50%;
    animation:spin .7s linear infinite;
    margin-right:8px;
    vertical-align:middle;
  }

  @keyframes spin{ to{ transform:rotate(360deg); } }

  /* ===== Modal (Tambah/Edit Supplier) ===== */
  .modal-overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(8,9,15,.65);
    backdrop-filter:blur(2px);
    align-items:center;
    justify-content:center;
    z-index:1000;
    padding:20px;
  }
  .modal-overlay.active{ display:flex; }

  .modal-box{
    background:var(--md-surface);
    border:1px solid var(--md-border);
    border-radius:14px;
    width:480px;
    max-width:100%;
    max-height:90vh;
    overflow-y:auto;
    box-shadow:0 20px 50px rgba(0,0,0,.45);
    animation:modalPop .15s ease;
  }

  @keyframes modalPop{
    from{ opacity:0; transform:translateY(8px) scale(.98); }
    to{ opacity:1; transform:translateY(0) scale(1); }
  }

  .modal-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:18px 22px;
    border-bottom:1px solid var(--md-border);
  }

  .modal-header h3{
    margin:0;
    font-size:16px;
    font-weight:700;
    color:var(--md-text);
  }

  .modal-close{
    background:none;
    border:none;
    color:var(--md-muted);
    font-size:18px;
    cursor:pointer;
    line-height:1;
    padding:4px;
    border-radius:6px;
    transition:background .15s ease, color .15s ease;
  }
  .modal-close:hover{ background:var(--md-surface-2); color:var(--md-text); }

  .modal-body{
    padding:22px;
  }

  .modal-footer{
    display:flex;
    justify-content:flex-end;
    gap:10px;
    padding:16px 22px;
    border-top:1px solid var(--md-border);
  }
</style>
</head>
<body>
<div class="content">

  <h2>🚚 Master Supplier</h2>
  <p class="page-subtitle">Kelola data master supplier / toko rekanan.</p>
  <br>

  <!-- ================= TOOLBAR ================= -->
  <div class="toolbar">
    <button class="btn-dashboard" onclick="location.href='dashboard.html'">
      🏠 Dashboard
    </button>
    <button class="btn-export" onclick="bukaModalTambah()">
      ➕ Tambah Supplier
    </button>
    <button class="btn-import" onclick="document.getElementById('fileImport').click()">
      📥 Import Excel
    </button>
    <input type="file" id="fileImport" accept=".xlsx,.xls,.csv" hidden>
    <button class="btn-export" onclick="exportExcel()">
      📤 Export Excel
    </button>
  </div>
  <br>

  <!-- ================= TABEL ================= -->
  <div class="panel">
    <h3>
      Daftar Supplier
      <span class="total-badge" id="totalBadge">0 item</span>
    </h3>

    <div class="table-toolbar">
      <input type="text" id="searchSupplier" class="search-box" placeholder="🔍 Cari kode atau nama toko...">
    </div>

    <div class="table-wrap">
      <table id="tableSupplier">
        <thead>
          <tr>
            <th width="150">Kode Supplier</th>
            <th>Nama Toko</th>
            <th width="160">Dibuat Oleh</th>
            <th width="170">Aksi</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td colspan="4" class="loading-state">
              <span class="spinner"></span> Memuat data...
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<!-- ================= MODAL TAMBAH/EDIT SUPPLIER ================= -->
<div class="modal-overlay" id="modalSupplier">
  <div class="modal-box">

    <div class="modal-header">
      <h3 id="judulForm">➕ Tambah Supplier</h3>
      <button type="button" class="modal-close" onclick="tutupModal()">✕</button>
    </div>

    <form id="formSupplier">
      <div class="modal-body">
        <div class="form-grid">

          <div class="field">
            <label for="kode_supplier">Kode Supplier</label>
            <input type="text" id="kode_supplier" placeholder="Contoh: SUP01" required>
          </div>

          <div class="field">
            <label for="nama_toko">Nama Toko</label>
            <input type="text" id="nama_toko" placeholder="Nama toko / supplier" required>
          </div>

        </div>
      </div>

      <div class="modal-footer">
        <button type="button" id="btnBatal" onclick="tutupModal()">
          Batal
        </button>
        <button type="submit" id="btnSimpan">
          💾 Simpan Supplier
        </button>
      </div>
    </form>

  </div>
</div>

<script src="js/master-supplier.js"></script>
</body>
</html>
